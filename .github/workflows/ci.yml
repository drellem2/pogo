name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up test fixtures
        run: |
          mkdir -p _testdata/a-service/.git
          mkdir -p _testdata/b-service/.git

      - name: Test
        run: go test ./...

  emacs-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox

      - name: Run Emacs Lisp tests
        run: emacs/run-tests.sh

  nvim-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Run Neovim plugin tests
        run: nvim/test_nvim.sh

  bash-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bash shell integration tests
        run: shell/bashrc_test.sh

  version-check:
    if: false  # Disabled — re-enable by removing this line
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for duplicate version tag
        run: ./scripts/check-version.sh

  build:
    # Darwin cells build on a native macOS runner. The FSEvents watch backend
    # (internal/watch/watch_darwin.go -> github.com/fsnotify/fsevents) needs
    # cgo, and Go disables cgo by default when cross-compiling from a Linux
    # host — so cross-building darwin from ubuntu-latest fails. Linux cells
    # stay on ubuntu-latest. See mg-6222 (regression from mg-d205).
    runs-on: ${{ matrix.goos == 'darwin' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # macos-latest is arm64, so one darwin cell still cross-compiles by
          # arch — Go disables cgo by default for any cross build. Force cgo
          # on for darwin so fsevents' cgo file (wrap.go) is compiled; the
          # macOS toolchain targets both arches. Linux keeps Go's default
          # (empty value == unset).
          CGO_ENABLED: ${{ matrix.goos == 'darwin' && '1' || '' }}
        run: |
          for cmd in cmd/*/; do
            name=$(basename "$cmd")
            echo "Building $name for $GOOS/$GOARCH"
            go build -o /dev/null "./$cmd"
          done
