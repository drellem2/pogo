name: Release

# Tag-creation policy (mg-9d82):
#   - Only the release-cut path pushes v* tags: either scripts/bump-version.sh
#     (which validates strict semver vX.Y.Z and signs the tag) or Daniel
#     directly. No other automation creates tags.
#   - Semver only: vX.Y.Z (patch for CI/doc-only, minor otherwise). Prereleases
#     vX.Y.Z-<suffix> are allowed and surface as GitHub prereleases via
#     goreleaser's `prerelease: auto`.
#   - On Actions outage at tag-push time, re-trigger via workflow_dispatch on
#     the tagged ref once the platform recovers. Failed publish leaves the tag
#     in place; re-run via workflow_dispatch (the goreleaser action handles
#     idempotent re-uploads).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25'

      - name: Reject replace directives in go.mod
        run: |
          if grep -qE '^replace\s' go.mod; then
            echo "ERROR: go.mod contains replace directives — aborting release."
            echo "Replace directives break 'go install ...@latest'."
            grep -n '^replace' go.mod
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >
            release --clean
            ${{ github.repository != 'drellem2/pogo' && '--skip=publish --skip=announce' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
