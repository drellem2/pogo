# PM config for pm-onethird. Loaded by the pm-template prompt at agent start.
# Schema: see docs/product-manager-design.md §2.

name        = "pm-onethird"
display     = "1/3-2/3 Conjecture"

# Repos this PM owns. Items / commits in any of these are in-scope.
repos       = ["one_third_width_three", "one_third"]

# mg tags that mark items as part of this product (any-of match).
tags_any    = ["onethird", "one-third", "lean", "audit"]

# Untracked dirs the PM still cares about (rarely needed; leave empty by default).
extra_paths = []

# Sources to scan during a sweep, in addition to the baseline in pm-template.md.
# pm-onethird's distinguishing sources: lean-specific signals.
sources = [
    "axioms",        # `#print axioms` output on key theorems — track regressions
    "audit-docs",    # audit reports under the lean repo (path per repo conventions)
    "sorry-count",   # `sorry` and `admit` counts over time
]
