# PM config for pm-pogo. Loaded by the pm-template prompt at agent start.
# Schema: see docs/product-manager-design.md §2.

name        = "pm-pogo"
display     = "Pogo / Macguffin"

# Repos this PM owns. Items / commits in any of these are in-scope.
repos       = ["pogo", "macguffin"]

# mg tags that mark items as part of this product (any-of match).
tags_any    = ["pogo", "macguffin"]

# Untracked dirs the PM still cares about (rarely needed; leave empty by default).
extra_paths = []

# Sources to scan during a sweep, in addition to the baseline in pm-template.md.
# pm-pogo's distinguishing source: polecat + crew transcripts as the
# highest-signal source for UX gaps.
sources = [
    "polecat-transcripts",   # ~/.pogo/polecats/*/transcript.* — friction signals
    "crew-transcripts",      # crew agent transcripts (architect, mayor, doctor)
    "refinery-history",      # recent merge failures
]
